name: Generate Persona Research Report

on:
  workflow_dispatch:
    inputs:
      company_name:
        description: '会社名'
        required: true
      person_name:
        description: '担当者名'
        required: false
        default: ''
      department:
        description: '部署'
        required: false
        default: ''
      service_key:
        description: 'サービス (persona_insight / human_research)'
        required: false
        default: 'persona_insight'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies for weasyprint
        run: sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          COMPANY_NAME: ${{ github.event.inputs.company_name }}
          PERSON_NAME: ${{ github.event.inputs.person_name }}
          DEPARTMENT: ${{ github.event.inputs.department }}
          SERVICE_KEY: ${{ github.event.inputs.service_key }}
        run: python generate_report.py

      - name: Commit and push report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add reports/
          git diff --staged --quiet || git commit -m "レポート生成: ${{ github.event.inputs.company_name }}"
          git push
