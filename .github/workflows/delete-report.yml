name: Delete Report

on:
  workflow_dispatch:
    inputs:
      filename:
        description: '削除するレポートファイル名（例: 株式会社〇〇_PI_20250613_120000.html）'
        required: true

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete report files
        run: |
          HTML_FILE="reports/${{ github.event.inputs.filename }}"
          PDF_FILE="${HTML_FILE%.html}.pdf"
          if [ -f "$HTML_FILE" ]; then rm "$HTML_FILE"; echo "Deleted $HTML_FILE"; fi
          if [ -f "$PDF_FILE" ]; then rm "$PDF_FILE"; echo "Deleted $PDF_FILE"; fi

      - name: Update index.json
        run: |
          python3 - <<'EOF'
          import json, os
          filename = "${{ github.event.inputs.filename }}"
          index_path = "reports/index.json"
          if not os.path.exists(index_path):
              exit(0)
          with open(index_path, encoding="utf-8") as f:
              index = json.load(f)
          index = [x for x in index if x.get("file") != filename]
          with open(index_path, "w", encoding="utf-8") as f:
              json.dump(index, f, ensure_ascii=False, indent=2)
          print(f"Updated index: removed {filename}")
          EOF

      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add reports/
          git diff --staged --quiet || git commit -m "レポート削除: ${{ github.event.inputs.filename }}"
          git push
